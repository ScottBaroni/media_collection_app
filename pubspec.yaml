name: media_shelf
description: "A mobile app to catalogue physical media collections — CDs, DVDs, books, and any custom collection types you create. Built with Flutter & Dart."

publish_to: 'none'


version: 1.0.1+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

